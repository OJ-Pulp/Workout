<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Workout</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f; --border: #2a2a2a;
    --text: #f0f0f0; --muted: #666;
    --accent-strength: #4a9eff; --accent-power: #f5a623;
    --accent-cardio: #4cd964; --accent-rest: #888;
    --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

  .top-bar { padding: 56px 20px 20px; border-bottom: 1px solid var(--border); }
  .top-bar .day-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .top-bar h1 { font-size: 28px; font-weight: 300; letter-spacing: -0.5px; }
  .top-bar h1 span { font-weight: 500; }

  .week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .day-cell { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .day-cell .d-name { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.05em; }
  .day-cell .d-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
  .day-cell.today .d-name { color: var(--text); }
  .day-cell.type-strength .d-dot { background: var(--accent-strength); }
  .day-cell.type-power .d-dot { background: var(--accent-power); }
  .day-cell.type-cardio .d-dot { background: var(--accent-cardio); }
  .day-cell.type-rest .d-dot { background: var(--border); }
  .day-cell.done .d-dot { opacity: 0.3; }
  .day-cell.today.type-strength .d-dot { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--accent-strength); }
  .day-cell.today.type-power .d-dot { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--accent-power); }
  .day-cell.today.type-cardio .d-dot { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--accent-cardio); }
  .day-cell.today.type-rest .d-dot { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--accent-rest); }

  .type-tag { display: inline-flex; align-items: center; gap: 6px; margin: 20px 20px 0; padding: 5px 12px; border-radius: 99px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid; }
  .type-tag.strength { color: var(--accent-strength); border-color: var(--accent-strength); }
  .type-tag.power { color: var(--accent-power); border-color: var(--accent-power); }
  .type-tag.cardio { color: var(--accent-cardio); border-color: var(--accent-cardio); }
  .type-tag.rest { color: var(--accent-rest); border-color: var(--accent-rest); }
  .type-tag .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .gen-section { padding: 20px; }
  .gen-btn { width: 100%; padding: 18px; border-radius: 14px; border: none; cursor: pointer; font-family: var(--sans); font-size: 16px; font-weight: 500; letter-spacing: -0.2px; background: var(--text); color: var(--bg); transition: transform 0.1s, opacity 0.1s; -webkit-appearance: none; }
  .gen-btn:active { transform: scale(0.97); opacity: 0.85; }
  .gen-btn.secondary { background: var(--surface2); color: var(--text); margin-top: 10px; font-weight: 400; font-size: 14px; padding: 14px; }

  .workout-section { padding: 0 20px; }
  .section-header { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin: 24px 0 10px; }
  .exercise-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); border-radius: 12px; margin-bottom: 6px; border: 1px solid var(--border); animation: slideIn 0.3s ease forwards; opacity: 0; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .exercise-name { font-size: 15px; font-weight: 400; }
  .exercise-meta { font-family: var(--mono); font-size: 12px; color: var(--muted); text-align: right; }

  .cardio-row { display: flex; flex-direction: column; gap: 6px; padding: 14px 16px; background: var(--surface); border-radius: 12px; margin-bottom: 6px; border: 1px solid var(--border); border-left: 3px solid var(--accent-cardio); animation: slideIn 0.3s ease forwards; opacity: 0; }
  .cardio-top { display: flex; align-items: center; justify-content: space-between; }
  .cardio-name { font-size: 15px; font-weight: 400; }
  .cardio-type { font-family: var(--mono); font-size: 10px; color: var(--accent-cardio); letter-spacing: 0.08em; text-transform: uppercase; }
  .cardio-detail { font-family: var(--mono); font-size: 13px; color: var(--muted); }

  .pool-section { padding: 0 20px; }
  .pool-cat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-family: var(--mono); letter-spacing: 0.05em; }
  .pool-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .pool-pill { font-family: var(--mono); font-size: 11px; padding: 4px 10px; border-radius: 99px; border: 1px solid var(--border); color: var(--muted); }
  .pool-pill.used { opacity: 0.25; text-decoration: line-through; }
  .pool-pill.fresh { color: var(--text); border-color: #444; }

  .rest-screen { padding: 40px 20px; text-align: center; }
  .rest-screen .rest-icon { font-size: 48px; margin-bottom: 16px; }
  .rest-screen p { color: var(--muted); font-size: 15px; line-height: 1.6; }

  .divider { height: 1px; background: var(--border); margin: 24px 20px; }
  .workout-note { margin: 12px 0 0; padding: 12px 16px; background: var(--surface); border-radius: 12px; border-left: 3px solid var(--accent-power); font-size: 13px; color: var(--muted); line-height: 1.5; }

  .reset-btn { display: block; width: calc(100% - 40px); margin: 0 20px; padding: 14px; background: transparent; border: 1px solid var(--border); border-radius: 12px; color: var(--muted); font-family: var(--sans); font-size: 13px; cursor: pointer; -webkit-appearance: none; }
  .reset-btn:active { opacity: 0.6; }
  .empty-state { padding: 32px 20px; text-align: center; color: var(--muted); font-size: 15px; line-height: 1.6; }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="day-label" id="date-label">Loading...</div>
    <h1>Today's <span>workout</span></h1>
  </div>
  <div class="week-strip" id="week-strip"></div>
  <div id="type-tag-container"></div>
  <div class="gen-section">
    <button class="gen-btn" id="gen-btn" onclick="generateWorkout()">Generate workout</button>
    <button class="gen-btn secondary" id="regen-btn" onclick="regenWorkout()" style="display:none;">Shuffle new picks</button>
  </div>
  <div id="workout-output"></div>
  <div class="divider" id="pool-divider" style="display:none;"></div>
  <div id="pool-output"></div>
  <div style="height:20px;"></div>
  <button class="reset-btn" onclick="resetWeek()">Reset week</button>
</div>

<script>
const DAY_SHORT = ['M','T','W','T','F','S','S'];

// Pools loaded from exercises.json at startup
let FULL_POOL = {};
let SPRINT_OPTS = {};
let DISTANCE_OPTS = {};
let CONFLICTS = [];

function getMondayStr() {
  const d = new Date(), day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d); mon.setDate(d.getDate() + diff);
  return mon.toISOString().split('T')[0];
}
function getTodayStr() { return new Date().toISOString().split('T')[0]; }
function getTodayIdx() { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// 2 strength, 2 power, 2 cardio across Mon–Sat. No back-to-back same type. Sunday always rest.
function generateSchedule() {
  const types = ['strength','strength','power','power','cardio','cardio'];
  for (let t = 0; t < 2000; t++) {
    const s = shuffle(types);
    let ok = true;
    for (let i = 1; i < s.length; i++) { if (s[i]===s[i-1]) { ok=false; break; } }
    if (ok) return [...s, 'rest'];
  }
  return ['strength','cardio','power','strength','cardio','power','rest'];
}

function freshState() {
  return { week_start: getMondayStr(), schedule: generateSchedule(), used: { upper:[], lower:[], core:[], cardio:[] }, log:{} };
}

function loadState() {
  try {
    const raw = localStorage.getItem('workout_v3');
    const s = raw ? JSON.parse(raw) : null;
    if (!s || s.week_start !== getMondayStr()) { const f=freshState(); saveState(f); return f; }
    return s;
  } catch(e) { return freshState(); }
}
function saveState(s) { try { localStorage.setItem('workout_v3', JSON.stringify(s)); } catch(e){} }

function availablePool(state) {
  const pool = {};
  for (const [cat, opts] of Object.entries(FULL_POOL)) {
    const rem = opts.filter(x => !state.used[cat].includes(x));
    pool[cat] = rem.length > 0 ? rem : [...opts];
  }
  return pool;
}

function pickArr(pool, n) { return shuffle(pool).slice(0, Math.min(n, pool.length)); }

function buildCardio(pool) {
  const modality = pickArr(pool.cardio, 1)[0];
  const isSprint = Math.random() < 0.5;
  if (isSprint) {
    const opts = SPRINT_OPTS[modality];
    const chosen = opts[Math.floor(Math.random()*opts.length)];
    return { modality, isSprint:true, detail:chosen[0], sets:chosen[1] };
  } else {
    const opts = DISTANCE_OPTS[modality];
    return { modality, isSprint:false, detail:opts[Math.floor(Math.random()*opts.length)], sets:null };
  }
}

function buildWorkout(state, dayType) {
  if (dayType === 'rest') return { type:'rest' };
  const pool = availablePool(state);

  if (dayType === 'cardio') {
    const cardio = buildCardio(pool);
    return { type:'cardio', cardio, usedCats:{ cardio:[cardio.modality] } };
  }

  let upper = pickArr(pool.upper, 2);
  let lower = pickArr(pool.lower, dayType==='strength' ? 2 : 1);

  // Apply conflict rules from exercises.json
  for (const pair of CONFLICTS) {
    if (pair.every(x => lower.includes(x))) {
      lower = lower.filter(x => x !== pair[1]);
      const alt = pool.lower.find(x => !lower.includes(x));
      if (alt) lower.push(alt);
    }
  }

  const core = pickArr(pool.core, Math.random()<0.5 ? 3 : 4);
  return { type:dayType, upper, lower, core, usedCats:{ upper, lower, core } };
}

function applyUsed(state, workout) {
  if (!workout.usedCats) return;
  for (const [cat, items] of Object.entries(workout.usedCats)) {
    for (const item of items) { if (!state.used[cat].includes(item)) state.used[cat].push(item); }
  }
}

function renderWeekStrip(state) {
  const todayIdx = getTodayIdx();
  let html = '';
  state.schedule.forEach((type, i) => {
    const isToday = i === todayIdx;
    const isDone = Object.keys(state.log).some(k => {
      const d = new Date(k+'T12:00:00');
      return (d.getDay()===0 ? 6 : d.getDay()-1) === i;
    });
    const cls = ['day-cell',`type-${type}`,isToday?'today':'',isDone?'done':''].filter(Boolean).join(' ');
    html += `<div class="${cls}"><span class="d-name">${DAY_SHORT[i]}</span><div class="d-dot"></div></div>`;
  });
  document.getElementById('week-strip').innerHTML = html;
}

function renderTypeTag(dayType) {
  const labels = { strength:'Strength', power:'Power', cardio:'Cardio', rest:'Rest' };
  document.getElementById('type-tag-container').innerHTML =
    `<div class="type-tag ${dayType}"><div class="dot"></div>${labels[dayType]||''}</div>`;
}

function renderWorkout(workout) {
  const out = document.getElementById('workout-output');
  const poolOut = document.getElementById('pool-output');
  const poolDiv = document.getElementById('pool-divider');

  if (!workout) {
    out.innerHTML = `<div class="empty-state">Tap generate to get today's workout.</div>`;
    poolOut.innerHTML=''; poolDiv.style.display='none'; return;
  }
  if (workout.type === 'rest') {
    out.innerHTML = `<div class="rest-screen"><div class="rest-icon">◯</div><p>Rest day — Sunday.<br>Recover, hydrate, eat well.</p></div>`;
    poolOut.innerHTML=''; poolDiv.style.display='none'; return;
  }

  let html='', delay=0;
  const row = (name, meta, d) =>
    `<div class="exercise-row" style="animation-delay:${d}ms"><span class="exercise-name">${name}</span><span class="exercise-meta">${meta}</span></div>`;

  if (workout.type === 'cardio') {
    const c = workout.cardio;
    const detail = c.isSprint ? `${c.detail}  ·  ${c.sets}` : c.detail;
    html += `<div class="workout-section"><div class="section-header">Cardio</div>
      <div class="cardio-row" style="animation-delay:0ms">
        <div class="cardio-top"><span class="cardio-name">${c.modality}</span><span class="cardio-type">${c.isSprint?'Sprint':'Distance'}</span></div>
        <span class="cardio-detail">${detail}</span>
      </div></div>`;
    out.innerHTML = html;

    // Pool: cardio only
    let poolHtml = `<div class="pool-section"><div class="section-header">Weekly pool</div>`;
    const state = loadState();
    poolHtml += `<div class="pool-cat-label">cardio</div><div class="pool-row">`;
    FULL_POOL.cardio.forEach(o => {
      const used = state.used.cardio.includes(o);
      poolHtml += `<span class="pool-pill ${used?'used':'fresh'}">${o}</span>`;
    });
    poolHtml += `</div></div>`;
    poolOut.innerHTML = poolHtml;
    poolDiv.style.display = 'block';
    return;
  }

  if (workout.type === 'power') {
    html += `<div class="workout-section"><div class="section-header">Power</div>${row('Box Jumps','2 sets',delay)}</div>`;
    delay += 60;
  }

  html += `<div class="workout-section"><div class="section-header">Upper body</div>`;
  workout.upper.forEach(e => { html += row(e,'2 sets',delay); delay+=60; });
  html += `</div>`;

  html += `<div class="workout-section"><div class="section-header">Lower body</div>`;
  workout.lower.forEach(e => { html += row(e,'2 sets',delay); delay+=60; });
  html += `</div>`;

  html += `<div class="workout-section"><div class="section-header">Core</div>`;
  workout.core.forEach(e => { html += row(e,'2 sets',delay); delay+=60; });
  html += `</div>`;

  if (workout.type === 'power') {
    html += `<div style="padding:0 20px;"><div class="workout-note">Do box jumps first while fresh.</div></div>`;
  }

  out.innerHTML = html;

  // Pool tracker: upper, lower, core
  const state = loadState();
  let poolHtml = `<div class="pool-section"><div class="section-header">Weekly pool</div>`;
  ['upper','lower','core'].forEach(cat => {
    poolHtml += `<div class="pool-cat-label">${cat}</div><div class="pool-row">`;
    FULL_POOL[cat].forEach(o => {
      const used = state.used[cat].includes(o);
      poolHtml += `<span class="pool-pill ${used?'used':'fresh'}">${o}</span>`;
    });
    poolHtml += `</div>`;
  });
  poolHtml += `</div>`;
  poolOut.innerHTML = poolHtml;
  poolDiv.style.display = 'block';
}

function generateWorkout() {
  const state = loadState();
  const todayStr = getTodayStr();
  const dayType = state.schedule[getTodayIdx()];

  if (state.log[todayStr]) {
    renderWorkout(state.log[todayStr]);
    document.getElementById('gen-btn').textContent = 'Generated';
    document.getElementById('regen-btn').style.display = 'block';
    return;
  }

  const workout = buildWorkout(state, dayType);
  applyUsed(state, workout);
  state.log[todayStr] = workout;
  saveState(state);
  renderWorkout(workout);
  renderWeekStrip(state);
  document.getElementById('gen-btn').textContent = 'Generated';
  document.getElementById('regen-btn').style.display = 'block';
}

function regenWorkout() {
  const state = loadState();
  const todayStr = getTodayStr();
  const dayType = state.schedule[getTodayIdx()];
  const old = state.log[todayStr];
  if (old && old.usedCats) {
    for (const [cat, items] of Object.entries(old.usedCats)) {
      state.used[cat] = state.used[cat].filter(x => !items.includes(x));
    }
  }
  delete state.log[todayStr];
  const workout = buildWorkout(state, dayType);
  applyUsed(state, workout);
  state.log[todayStr] = workout;
  saveState(state);
  renderWorkout(workout);
  renderWeekStrip(state);
}

function resetWeek() {
  if (confirm('Reset the entire week?')) { localStorage.removeItem('workout_v3'); init(); }
}

async function init() {
  // Load exercises from JSON, fall back to empty pools if offline and uncached
  try {
    const res = await fetch('/Workout/exercises.json');
    const data = await res.json();
    FULL_POOL   = { upper: data.upper, lower: data.lower, core: data.core, cardio: data.cardio };
    SPRINT_OPTS   = data.sprint;
    DISTANCE_OPTS = data.distance;
    CONFLICTS     = data.conflicts || [];
  } catch(e) {
    console.warn('Could not load exercises.json, using cached state only.');
  }

  const state = loadState();
  const todayStr = getTodayStr();
  const todayIdx = getTodayIdx();
  const d = new Date();
  document.getElementById('date-label').textContent =
    d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  renderWeekStrip(state);
  renderTypeTag(state.schedule[todayIdx]);
  const regen = document.getElementById('regen-btn');
  if (state.log[todayStr]) {
    renderWorkout(state.log[todayStr]);
    document.getElementById('gen-btn').textContent = 'Generated';
    regen.style.display = 'block';
  } else {
    renderWorkout(null);
    regen.style.display = 'none';
  }
}

init();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/Workout/sw.js')
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
