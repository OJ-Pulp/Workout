<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Workout</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="day-label" id="date-label">Loading...</div>
    <h1>Today's <span>workout</span></h1>
  </div>
  <div class="week-strip" id="week-strip"></div>
  <div id="type-tag-container"></div>
  <div class="gen-section">
    <button class="gen-btn" id="gen-btn" onclick="generateWorkout()">Generate workout</button>
    <button class="gen-btn secondary" id="regen-btn" onclick="regenWorkout()" style="display:none;">Shuffle new picks</button>
  </div>
  <div id="workout-output"></div>
  <div class="divider" id="pool-divider" style="display:none;"></div>
  <div id="pool-output"></div>
  <div style="height:20px;"></div>
  <button class="reset-btn" onclick="resetWeek()">Reset week</button>
</div>
<script src="app.js"></script>
</body>
</html>
